version: "3"

tasks:
  install:
    desc: Install Agent Patch Kit CLI in editable mode
    cmds:
      - python -m pip install -e .

  doctor:
    desc: Check local Windows/CLI environment
    cmds:
      - apatch doctor

  init:
    desc: Create .agentpatch.json and lychee.toml
    cmds:
      - apatch init --write-lychee

  patch:brief:
    desc: Print developer-only fast-read brief
    cmds:
      - apatch brief --format md

  patch:state:
    desc: Show Agent Patch Kit effective state
    cmds:
      - apatch state status

  patch:enable:user:
    desc: Enable Agent Patch Kit for current user
    cmds:
      - apatch state enable --scope user

  patch:disable:user:
    desc: Disable Agent Patch Kit for current user
    cmds:
      - apatch state disable --scope user

  patch:status:
    desc: Show git status before patching
    cmds:
      - apatch state status
      - apatch status

  patch:scan:
    desc: Scan fixed string. Use QUERY="..."
    cmds:
      - apatch scan --fixed "{{.QUERY}}"

  patch:preview:
    desc: Preview fixed replacement. Use OLD="..." NEW="..."
    cmds:
      - apatch replace --fixed --old "{{.OLD}}" --new "{{.NEW}}" --preview

  patch:apply:
    desc: Apply fixed replacement with automatic transaction snapshot
    cmds:
      - apatch replace --fixed --old "{{.OLD}}" --new "{{.NEW}}" --apply

  patch:verify:
    desc: Verify patch. Optional OLD="..." NEW="..."
    cmds:
      - apatch verify {{if .OLD}}--old "{{.OLD}}"{{end}} {{if .NEW}}--new "{{.NEW}}"{{end}} --fixed

  patch:summary:
    desc: Summarize current git diff
    cmds:
      - apatch summary

  docs:links:
    desc: Validate Markdown links online/offline according to config
    cmds:
      - apatch links --mode offline --include-fragments full

  verify:
    desc: Repository verification entry
    cmds:
      - apatch state status
      - apatch verify
      - task: docs:links

  package:aicoding:
    desc: Build AiCoding Agent Patch plugin package
    cmds:
      - apatch package aicoding-plugin --out dist/agent-patch-kit --zip
