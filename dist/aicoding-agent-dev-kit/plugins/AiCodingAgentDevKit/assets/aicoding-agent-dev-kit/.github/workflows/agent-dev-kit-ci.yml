name: Agent Dev Kit CI

on:
  pull_request:
  push:
    branches: [ main, dev, develop ]

jobs:
  quality-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Agent Dev Kit quality gate
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/invoke-agent-quality-gate.ps1 -Mode ci -Json
