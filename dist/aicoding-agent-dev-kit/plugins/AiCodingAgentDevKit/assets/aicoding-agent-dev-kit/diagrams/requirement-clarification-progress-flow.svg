<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="460" viewBox="0 0 1260 460">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#333"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 10; }
      .decision { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.6; rx: 10; }
      .doc { fill: #eef2ff; stroke: #3730a3; stroke-width: 1.5; rx: 10; }
      .run { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 10; }
      .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 15px; fill: #111827; }
      .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 12px; fill: #374151; }
      .arrow { stroke: #333; stroke-width: 1.4; marker-end: url(#arrow); }
    </style>
  </defs>
  <text x="40" y="38" class="text" font-size="22">v0.11.1 需求澄清、方案选择与进度监控</text>

  <rect x="40" y="90" width="150" height="75" class="box"/>
  <text x="67" y="118" class="text">模糊需求</text>
  <text x="55" y="142" class="small">用户还没选方案</text>

  <line x1="190" y1="128" x2="235" y2="128" class="arrow"/>
  <rect x="235" y="80" width="175" height="95" class="doc"/>
  <text x="263" y="112" class="text">PRD Options</text>
  <text x="250" y="138" class="small">2-5 个实现路径</text>
  <text x="250" y="158" class="small">优劣 / 风险 / 验证</text>

  <line x1="410" y1="128" x2="455" y2="128" class="arrow"/>
  <rect x="455" y="80" width="170" height="95" class="decision"/>
  <text x="485" y="112" class="text">人选择方案</text>
  <text x="470" y="138" class="small">Agent 可推荐</text>
  <text x="470" y="158" class="small">但不能静默决定</text>

  <line x1="625" y1="128" x2="670" y2="128" class="arrow"/>
  <rect x="670" y="80" width="185" height="95" class="doc"/>
  <text x="695" y="112" class="text">同步正式文档</text>
  <text x="690" y="138" class="small">PRD / Flow / ADR</text>
  <text x="690" y="158" class="small">Implementation Plan</text>

  <line x1="855" y1="128" x2="900" y2="128" class="arrow"/>
  <rect x="900" y="80" width="170" height="95" class="doc"/>
  <text x="932" y="112" class="text">拆分 MVP</text>
  <text x="917" y="138" class="small">小功能 / 小模块</text>
  <text x="917" y="158" class="small">Red-Green-Refactor</text>

  <line x1="1070" y1="128" x2="1115" y2="128" class="arrow"/>
  <rect x="1115" y="80" width="120" height="95" class="run"/>
  <text x="1140" y="112" class="text">实现</text>
  <text x="1130" y="138" class="small">进度监控</text>
  <text x="1130" y="158" class="small">Gate</text>

  <path d="M1175 175 C1130 250, 970 250, 820 205" fill="none" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="900" y="260" class="small" fill="#b91c1c">方案变化必须回写文档和决策记录</text>

  <rect x="265" y="300" width="720" height="95" class="box"/>
  <text x="290" y="330" class="text">实时进度输出</text>
  <text x="290" y="356" class="small">aicoding-agent-kit progress status --repo .</text>
  <text x="290" y="376" class="small">.agent-dev-kit/progress/progress-board.json + spec/MVP_PROGRESS.md</text>
</svg>
