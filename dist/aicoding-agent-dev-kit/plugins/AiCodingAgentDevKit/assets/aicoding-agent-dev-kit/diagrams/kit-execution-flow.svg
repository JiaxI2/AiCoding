<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#333"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 10; }
      .gate { fill: #eef2ff; stroke: #3730a3; stroke-width: 1.5; rx: 10; }
      .run { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 10; }
      .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 16px; fill: #111827; }
      .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #374151; }
      .arrow { stroke: #333; stroke-width: 1.4; marker-end: url(#arrow); }
    </style>
  </defs>
  <text x="40" y="38" class="text" font-size="22">AiCoding Agent Dev Kit 执行逻辑</text>
  <rect x="40" y="80" width="145" height="70" class="box"/>
  <text x="62" y="110" class="text">会话开始</text>
  <text x="55" y="132" class="small">读规则 / memory</text>
  <line x1="185" y1="115" x2="225" y2="115" class="arrow"/>
  <rect x="225" y="80" width="150" height="70" class="box"/>
  <text x="253" y="108" class="text">Spec Pack</text>
  <text x="242" y="132" class="small">PRD / Flow / Tech</text>
  <line x1="375" y1="115" x2="415" y2="115" class="arrow"/>
  <rect x="415" y="70" width="165" height="90" class="gate"/>
  <text x="445" y="102" class="text">三道审查门</text>
  <text x="432" y="126" class="small">需求 / 设计 / 任务</text>
  <text x="445" y="146" class="small">不通过则回源修正</text>
  <line x1="580" y1="115" x2="620" y2="115" class="arrow"/>
  <rect x="620" y="80" width="165" height="70" class="gate"/>
  <text x="642" y="108" class="text">TDD Plan</text>
  <text x="637" y="132" class="small">Red / Green / Refactor</text>
  <line x1="785" y1="115" x2="825" y2="115" class="arrow"/>
  <rect x="825" y="80" width="150" height="70" class="box"/>
  <text x="857" y="108" class="text">Worktree</text>
  <text x="844" y="132" class="small">并行隔离执行</text>
  <line x1="975" y1="115" x2="1015" y2="115" class="arrow"/>
  <rect x="1015" y="80" width="145" height="70" class="run"/>
  <text x="1048" y="108" class="text">实现</text>
  <text x="1032" y="132" class="small">测试通过才完成</text>
  <line x1="1087" y1="150" x2="1087" y2="230" class="arrow"/>
  <rect x="1015" y="230" width="145" height="70" class="box"/>
  <text x="1032" y="258" class="text">更新记忆</text>
  <text x="1028" y="282" class="small">progress / lessons</text>
  <line x1="1015" y1="265" x2="940" y2="265" class="arrow"/>
  <rect x="775" y="230" width="165" height="70" class="gate"/>
  <text x="812" y="258" class="text">Git Hook</text>
  <text x="790" y="282" class="small">pre-commit 快速失败</text>
  <line x1="775" y1="265" x2="700" y2="265" class="arrow"/>
  <rect x="535" y="230" width="165" height="70" class="gate"/>
  <text x="583" y="258" class="text">CI</text>
  <text x="552" y="282" class="small">远程质量门禁兜底</text>
  <line x1="535" y1="265" x2="455" y2="265" class="arrow"/>
  <rect x="295" y="230" width="160" height="70" class="run"/>
  <text x="330" y="258" class="text">完成交付</text>
  <text x="315" y="282" class="small">traceability / changelog</text>
  <path d="M620 300 C520 365, 270 360, 240 160" fill="none" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="370" class="small" fill="#b91c1c">任何失败都回到 Spec / Plan / Tests 修正</text>
</svg>
