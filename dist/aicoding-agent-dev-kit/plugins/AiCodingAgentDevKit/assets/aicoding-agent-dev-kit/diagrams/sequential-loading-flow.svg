<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#333"/>
    </marker>
    <style>
      .stage { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; rx: 12; }
      .deep { fill: #eef2ff; stroke: #3730a3; stroke-width: 1.6; rx: 12; }
      .out { fill: #ecfdf5; stroke: #047857; stroke-width: 1.6; rx: 12; }
      .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 16px; fill: #111827; }
      .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #374151; }
      .arrow { stroke: #333; stroke-width: 1.4; marker-end: url(#arrow); }
    </style>
  </defs>
  <text x="40" y="40" class="text" font-size="22">v0.11.1 循序加载机制</text>

  <rect x="40" y="90" width="190" height="95" class="stage"/>
  <text x="85" y="120" class="text">L0 Fast Start</text>
  <text x="60" y="145" class="small">CURRENT / DECISIONS</text>
  <text x="60" y="165" class="small">changed-file list</text>

  <line x1="230" y1="137" x2="280" y2="137" class="arrow"/>
  <rect x="280" y="90" width="205" height="95" class="stage"/>
  <text x="330" y="120" class="text">L1 Minimal</text>
  <text x="300" y="145" class="small">Implementation plan</text>
  <text x="300" y="165" class="small">Test strategy / snippets</text>

  <line x1="485" y1="137" x2="535" y2="137" class="arrow"/>
  <rect x="535" y="90" width="205" height="95" class="deep"/>
  <text x="585" y="120" class="text">L2 Task Context</text>
  <text x="555" y="145" class="small">Specs / interfaces</text>
  <text x="555" y="165" class="small">Touched modules / tests</text>

  <line x1="740" y1="137" x2="790" y2="137" class="arrow"/>
  <rect x="790" y="90" width="205" height="95" class="deep"/>
  <text x="845" y="120" class="text">L3 Deep Trace</text>
  <text x="810" y="145" class="small">ADR / BDD / TDD</text>
  <text x="810" y="165" class="small">Traceability / DocSync</text>

  <line x1="895" y1="185" x2="895" y2="250" class="arrow"/>
  <rect x="710" y="250" width="370" height="90" class="out"/>
  <text x="780" y="282" class="text">Context Pack + Manifest</text>
  <text x="735" y="308" class="small">.agent-dev-kit/context/context-pack.md</text>
  <text x="735" y="328" class="small">.agent-dev-kit/context/context-manifest.json</text>

  <path d="M630 250 C580 220, 420 225, 380 185" fill="none" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="390" y="245" class="small" fill="#b91c1c">失败或范围扩大时升级加载</text>
</svg>
