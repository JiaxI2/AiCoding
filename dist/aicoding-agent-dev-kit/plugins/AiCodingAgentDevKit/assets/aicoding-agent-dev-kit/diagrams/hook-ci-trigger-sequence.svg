<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#333"/>
    </marker>
    <style>
      .actor { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 10; }
      .lifeline { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 5 5; }
      .msg { stroke: #333; stroke-width: 1.4; marker-end: url(#arrow); }
      .text { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 16px; fill: #111827; }
      .small { font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 13px; fill: #374151; }
      .note { fill: #fffbeb; stroke: #b45309; stroke-width: 1.2; rx: 8; }
    </style>
  </defs>
  <text x="40" y="38" class="text" font-size="22">Skill / Hook / CI 触发时序</text>
  <rect x="55" y="70" width="145" height="48" class="actor"/>
  <text x="88" y="100" class="text">Agent</text>
  <line x1="128" y1="118" x2="128" y2="470" class="lifeline"/>
  <rect x="285" y="70" width="145" height="48" class="actor"/>
  <text x="318" y="100" class="text">Thin Skill</text>
  <line x1="358" y1="118" x2="358" y2="470" class="lifeline"/>
  <rect x="515" y="70" width="165" height="48" class="actor"/>
  <text x="548" y="100" class="text">Kit Scripts</text>
  <line x1="598" y1="118" x2="598" y2="470" class="lifeline"/>
  <rect x="765" y="70" width="145" height="48" class="actor"/>
  <text x="805" y="100" class="text">Git Hook</text>
  <line x1="838" y1="118" x2="838" y2="470" class="lifeline"/>
  <rect x="995" y="70" width="145" height="48" class="actor"/>
  <text x="1045" y="100" class="text">CI</text>
  <line x1="1068" y1="118" x2="1068" y2="470" class="lifeline"/>
  <line x1="128" y1="155" x2="358" y2="155" class="msg"/>
  <text x="155" y="145" class="small">读取 Thin Skill 路由规则</text>
  <line x1="358" y1="205" x2="598" y2="205" class="msg"/>
  <text x="385" y="195" class="small">读取 spec / memory / subagents</text>
  <line x1="598" y1="255" x2="128" y2="255" class="msg"/>
  <text x="245" y="245" class="small">返回执行计划与 TDD 检查结果</text>
  <line x1="128" y1="305" x2="838" y2="305" class="msg"/>
  <text x="245" y="295" class="small">git commit 触发 pre-commit</text>
  <line x1="838" y1="350" x2="598" y2="350" class="msg"/>
  <text x="660" y="340" class="small">invoke-agent-quality-gate -Mode pre-commit</text>
  <line x1="128" y1="400" x2="1068" y2="400" class="msg"/>
  <text x="300" y="390" class="small">git push / pull_request</text>
  <line x1="1068" y1="445" x2="598" y2="445" class="msg"/>
  <text x="705" y="435" class="small">同一个 quality gate -Mode ci</text>
  <rect x="515" y="475" width="350" height="35" class="note"/>
  <text x="535" y="498" class="small">单一事实源：Hook 与 CI 共用 scripts/invoke-agent-quality-gate.ps1</text>
</svg>
