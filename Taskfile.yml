version: '3'

# AiCoding unified task entry.
# Keep this file as command routing only. Business logic belongs in Go CLI or scripts/.

tasks:
  default:
    desc: Show available AiCoding tasks
    cmds:
      - task --list

  setup:
    desc: Bootstrap AiCoding Go Fast Path binary
    cmds:
      - go run ./cmd/aicoding bootstrap --json

  smoke:
    desc: Run fast local Smoke gate
    cmds:
      - bin/aicoding.exe kit verify --all --profile Smoke --json
      - bin/aicoding.exe governance lint --json
      - bin/aicoding.exe verify hooks --json
      - bin/aicoding.exe verify repo-text --json
      - bin/aicoding.exe verify release-notes --json
      - bin/aicoding.exe doctor perf --json

  perf:
    desc: Run fast path performance probes
    cmds:
      - bin/aicoding.exe doctor perf --json

  full:
    desc: Run Go-native Full aggregate validation
    cmds:
      - bin/aicoding.exe full --json

  release:
    desc: Run Go-native Release gate
    cmds:
      - bin/aicoding.exe release gate --json

  skills:
    desc: Verify all repo-scoped skills through Go
    cmds:
      - bin/aicoding.exe skill verify --all --profile Full --json

  rollback:
    desc: Roll back last Go lifecycle state snapshot
    cmds:
      - bin/aicoding.exe lifecycle rollback --last --json

  tag:audit:
    desc: Audit current tag/release namespace classification
    deps: [ensure-bin]
    cmds:
      - bin/aicoding.exe tag audit --json

  tag:plan:
    desc: Generate non-destructive legacy tag migration plan
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/aicoding-tag-governance.ps1 -Action Plan

  tag:verify:
    desc: Verify release governance overlay in non-strict legacy mode
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/verify-release-governance-overlay.ps1 -Json



  style:c:status:
    desc: Check C style formatter kit status
    cmds:
      - bin/aicoding.exe cstyle status --json

  style:c:templates:
    desc: Validate C comment template config
    cmds:
      - bin/aicoding.exe cstyle templates --json

  fmt:c:
    desc: Format changed C/H files
    cmds:
      - bin/aicoding.exe cstyle fmt --scope changed --json

  fmt-check:c:
    desc: Check format for changed C/H files
    cmds:
      - bin/aicoding.exe cstyle check --scope changed --json

  fmt-check-staged:c:
    desc: Check format for staged C/H files
    cmds:
      - bin/aicoding.exe cstyle check --scope staged --json

  fmt-staged:c:
    desc: Format staged C/H files
    cmds:
      - bin/aicoding.exe cstyle fmt --scope staged --json

  fmt-all:c:
    desc: Format all repository C/H files
    cmds:
      - bin/aicoding.exe cstyle fmt --scope all --json

  fmt-check-all:c:
    desc: Check format for all repository C/H files
    cmds:
      - bin/aicoding.exe cstyle check --scope all --json

  style:c:test:
    desc: Run C style format kit tests
    cmds:
      - go test ./internal/cstyle

  ensure-bin:
    internal: true
    cmds:
      - go run ./cmd/aicoding bootstrap --json
