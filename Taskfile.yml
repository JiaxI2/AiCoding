version: '3'

# AiCoding unified task entry.
# Keep this file as routing only. Business logic belongs in Go CLI; scripts are compatibility or specialty routes.

tasks:
  default:
    desc: Show available AiCoding tasks
    cmds:
      - task --list

  setup:
    desc: Bootstrap AiCoding Go control-plane binary
    cmds:
      - go run ./cmd/aicoding bootstrap --json

  smoke:
    desc: Run Go-native Smoke aggregate
    deps: [ensure-bin]
    cmds:
      - bin/aicoding.exe smoke --json

  ci:
    desc: Run Go-native CI aggregate
    deps: [ensure-bin]
    cmds:
      - bin/aicoding.exe ci --profile Smoke --json

  full:
    desc: Run official AiCoding Full test profile
    deps: [ensure-bin]
    cmds:
      - bin/aicoding.exe test full --json

  release:
    desc: Run official AiCoding Release test profile
    deps: [ensure-bin]
    cmds:
      - bin/aicoding.exe test release --json

  test:latest:
    desc: Show latest official AiCoding test report
    deps: [ensure-bin]
    cmds:
      - bin/aicoding.exe test latest

  style:c:status:
    desc: Check C99 Standard C skill formatter status
    deps: [ensure-bin]
    cmds:
      - bin/aicoding.exe skill c99-standard-c status --json

  style:c:templates:
    desc: Validate C99 Standard C comment templates
    deps: [ensure-bin]
    cmds:
      - bin/aicoding.exe skill c99-standard-c templates --json

  fmt:c:
    desc: Format changed C/H files through C99 Standard C skill
    deps: [ensure-bin]
    cmds:
      - bin/aicoding.exe skill c99-standard-c fmt --scope changed --json

  fmt-check:c:
    desc: Check changed C/H files through C99 Standard C skill
    deps: [ensure-bin]
    cmds:
      - bin/aicoding.exe skill c99-standard-c check --scope changed --json

  fmt-check-staged:c:
    desc: Check staged C/H files through C99 Standard C skill
    deps: [ensure-bin]
    cmds:
      - bin/aicoding.exe skill c99-standard-c check --scope staged --json

  ensure-bin:
    internal: true
    cmds:
      - go run ./cmd/aicoding bootstrap --json
