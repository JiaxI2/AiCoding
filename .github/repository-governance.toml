schema_version = 1

[governance_standard]
id = "aicoding-git-governance"
version = "2026.07.16"
source_url = "https://github.com/JiaxI2/Codex-Skills/blob/main/platform/aicoding-git-governance/references/aicoding-git-governance-standard.md"
raw_url = "https://raw.githubusercontent.com/JiaxI2/Codex-Skills/main/platform/aicoding-git-governance/references/aicoding-git-governance-standard.md"
sync_policy = "track-canonical-url"

[project]
name = "AiCoding"
repository_url = "https://github.com/JiaxI2/AiCoding.git"
visibility = "public"
audience = ["maintainer", "agent", "embedded-developer"]
default_language = "zh-CN"

[branch]
profile = "github-flow-lite"
stable = "main"
integration = ""
test = ""
prerelease = ""
require_pull_request = false

[readme]
enabled = true
profile = "minimal-public"
file = "README.md"
primary_language = "zh-CN"
language_order = ["zh-CN", "en"]
secondary_language_file = "README_CN.md"
english_language_file = "README_EN.md"
secondary_language_surface = "top-file-language-switch-and-github-about"
quick_environment_preview = true
require_toc = false
validate_links = true
required_sections = ["status", "quick-start", "repository-navigation", "git-workflow"]

[readme.urls]
documentation = "./README_CN.md"
chinese_documentation = "https://github.com/JiaxI2/AiCoding/blob/main/README_CN.md"
changelog = "./CHANGELOG.md"
latest_release = "https://github.com/JiaxI2/AiCoding/releases/latest"
releases = "https://github.com/JiaxI2/AiCoding/releases"
issues = "https://github.com/JiaxI2/AiCoding/issues"
contributing = "./CONTRIBUTING.md"
security = "./SECURITY.md"
license = "./LICENSE"

[issues]
enabled = true
profile = "managed-lifecycle"
templates_directory = ".github/ISSUE_TEMPLATE"
label_manifest = ".github/issue-labels.json"
workflow = ".github/workflows/issue-governance.yml"
allow_blank = false
required_label_axes = ["type", "area", "priority", "status"]
closure_requires_resolution = true
closure_requires_summary = true
auto_close_stale = false

[changelog]
enabled = true
mode = "unreleased"
file = "CHANGELOG.md"
fragment_directory = ""
categories = ["Added", "Changed", "Deprecated", "Removed", "Fixed", "Security", "Documentation", "Build"]
require_pr_or_issue_links = false
compare_links = true
require_typed_entries = true

[version]
scheme = "semver"
files = []
tag_pattern = "v{version}"
annotated_tag = true
signed_tag = false
stable_branch = "main"

[release]
enabled = true
profile = "minor"
notes_mode = "curated"
notes_template = ".github/RELEASE_TEMPLATE.md"
notes_validator = "bin/aicoding.exe verify release-notes --json"
required_sections = ["Summary", "What's Changed", "Compatibility", "Deprecations", "Release Notes", "Full Changelog", "New Contributors", "Known Issues", "Traceability"]
required_bilingual_sections = ["摘要 / Summary", "变更内容 / What's Changed", "兼容性 / Compatibility", "废弃项 / Deprecations", "发布说明 / Release Notes", "完整变更 / Full Changelog", "新贡献者 / New Contributors", "已知问题 / Known Issues", "可追溯性 / Traceability", "资产 / Assets"]
optional_sections = ["Highlights / Major Changes", "Breaking Changes / Migration", "Assets / Checksums", "Upgrade / Programming", "Rollback"]
require_explicit_deprecations = true
require_new_contributors_when_present = true
immutable_release = false

[firmware]
enabled = false
storage = "none"
metadata_directory = "firmware"
require_sha256 = false
naming_pattern = "{product}-{target}-{version}-{configuration}.{ext}"

[automation]
render_templates = false
validate_markdown_links = true
validate_release_notes = true
github_generated_release_notes = false
hooks_path = ".githooks"
lint_command = "bin/aicoding.exe governance lint --json"

[architecture]
enabled = true
principle = "lower-must-not-depend-on-or-observe-upper"
layer_order = ["runtime", "capability", "integration", "platform"]
dependency_rule = "higher-rank-may-depend-on-equal-or-lower-rank"
dependency_policy = "config/dependency-governance.json"
dependency_validator = "bin/aicoding.exe governance dependencies --json"
reserved_platform_namespace = "aicoding"
mcp_workflow_prompts = "forbidden"
readme_version_surface = "badges-only"
version_badge_policy = "config/dependency-governance.json#versionVisibility.readmeBadges"

[github_about]
require_bilingual = true
language_order = ["zh-CN", "en"]
description_zh = "AiCoding：本地 AI 辅助嵌入式开发平台，集成 Agent Patch Kit 与 AI Debug Repair Kit。"
description_en = "Local AI-assisted embedded development platform with Agent Patch Kit and AI Debug Repair Kit."
homepage = "https://github.com/JiaxI2/AiCoding/blob/main/README_CN.md"
topics = ["aicoding", "agent-patch-kit", "ai-debug-kit", "embedded-debug"]
