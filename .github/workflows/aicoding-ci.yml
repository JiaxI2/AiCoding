name: AiCoding CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
  schedule:
    - cron: '17 20 * * 0'

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Report effective Go version
        shell: pwsh
        run: |
          $match = [regex]::Match((Get-Content go.mod -Raw), '(?m)^toolchain\s+(go\S+)\s*$')
          if (-not $match.Success) { throw 'go.mod has no toolchain directive' }
          $expected = $match.Groups[1].Value
          $actual = (go env GOVERSION).Trim()
          go version
          if ($actual -ne $expected) { throw "effective Go version $actual does not match go.mod toolchain $expected" }

      - name: Build Go CLI
        shell: cmd
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: AiCoding Smoke profile
        shell: cmd
        run: .\bin\aicoding.exe test --profile Smoke --json

      - name: Upload Smoke test evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: smoke-test-evidence
          path: test-results/
          if-no-files-found: error

  # Keep default reuse off until reviewers cite three consecutive successful release-gate runs on main.
  # Promotion to auto must be a separate reviewed commit.
  release-gate:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@70f2430ad412f838533de8c0515c749ffb2b8bd3 # v1
        with:
          version: '3.52.0'

      - name: Report effective Go version
        shell: pwsh
        run: |
          $match = [regex]::Match((Get-Content go.mod -Raw), '(?m)^toolchain\s+(go\S+)\s*$')
          if (-not $match.Success) { throw 'go.mod has no toolchain directive' }
          $expected = $match.Groups[1].Value
          $actual = (go env GOVERSION).Trim()
          go version
          if ($actual -ne $expected) { throw "effective Go version $actual does not match go.mod toolchain $expected" }

      - name: Build Go CLI
        shell: cmd
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: Release test profile
        shell: cmd
        run: .\bin\aicoding.exe test --profile Release --reuse off --json

      - name: Audit Release Receipt reuse
        shell: cmd
        run: .\bin\aicoding.exe test --profile Release --verify-reuse --json

      - name: Upload Release gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-gate-evidence
          path: test-results/
          if-no-files-found: error

  clean-clone-full:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Report effective Go version
        shell: pwsh
        run: |
          $match = [regex]::Match((Get-Content go.mod -Raw), '(?m)^toolchain\s+(go\S+)\s*$')
          if (-not $match.Success) { throw 'go.mod has no toolchain directive' }
          $expected = $match.Groups[1].Value
          $actual = (go env GOVERSION).Trim()
          go version
          if ($actual -ne $expected) { throw "effective Go version $actual does not match go.mod toolchain $expected" }

      - name: Build Go CLI
        shell: cmd
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: Clean-clone Full Go tests
        shell: cmd
        run: .\bin\aicoding.exe fresh-clone --profile Full --json

  # workflow_dispatch is the explicit schedule-equivalent probe; pull_request and push never select this job.
  scheduled-doctor-perf:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Report effective Go version
        shell: pwsh
        run: |
          $match = [regex]::Match((Get-Content go.mod -Raw), '(?m)^toolchain\s+(go\S+)\s*$')
          if (-not $match.Success) { throw 'go.mod has no toolchain directive' }
          $expected = $match.Groups[1].Value
          $actual = (go env GOVERSION).Trim()
          go version
          if ($actual -ne $expected) { throw "effective Go version $actual does not match go.mod toolchain $expected" }

      - name: Build Go CLI
        shell: cmd
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: Scheduled doctor performance gate
        shell: pwsh
        run: |
          $output = & .\bin\aicoding.exe doctor perf --json
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath doctor-perf.json
          exit $exitCode

      - name: Upload doctor performance evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: doctor-perf-evidence
          path: doctor-perf.json
          if-no-files-found: error
