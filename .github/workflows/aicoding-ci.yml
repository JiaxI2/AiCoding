name: AiCoding CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
  schedule:
    - cron: '17 20 * * 0'

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Go CLI
        shell: cmd
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: Repository layout gate
        shell: cmd
        run: .\bin\aicoding.exe governance layout --json

      - name: Go CI Smoke
        shell: cmd
        run: .\bin\aicoding.exe ci --profile Smoke --json

  release-gate:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Go CLI
        shell: cmd
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: Repository layout gate
        shell: cmd
        run: .\bin\aicoding.exe governance layout --json

      - name: Release test profile
        shell: cmd
        run: .\bin\aicoding.exe test release --json
