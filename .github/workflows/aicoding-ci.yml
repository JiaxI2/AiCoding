name: AiCoding CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
  schedule:
    - cron: '17 20 * * 0'

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      - name: Report effective Go version
        shell: pwsh
        run: |
          $match = [regex]::Match((Get-Content go.mod -Raw), '(?m)^toolchain\s+(go\S+)\s*$')
          if (-not $match.Success) { throw 'go.mod has no toolchain directive' }
          $expected = $match.Groups[1].Value
          $actual = (go env GOVERSION).Trim()
          go version
          if ($actual -ne $expected) { throw "effective Go version $actual does not match go.mod toolchain $expected" }

      - name: Build Go CLI
        shell: cmd
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: AiCoding Smoke profile
        shell: cmd
        run: .\bin\aicoding.exe test --profile Smoke --json

      - name: Upload Smoke test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smoke-test-evidence
          path: test-results/
          if-no-files-found: error

  # Default auto was promoted after three consecutive successful release-gate runs on main.
  # Keep the explicit off seed and verify-reuse audit commands unchanged.
  release-gate:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2
        with:
          version: '3.52.0'

      - name: Report effective Go version
        shell: pwsh
        run: |
          $match = [regex]::Match((Get-Content go.mod -Raw), '(?m)^toolchain\s+(go\S+)\s*$')
          if (-not $match.Success) { throw 'go.mod has no toolchain directive' }
          $expected = $match.Groups[1].Value
          $actual = (go env GOVERSION).Trim()
          go version
          if ($actual -ne $expected) { throw "effective Go version $actual does not match go.mod toolchain $expected" }

      - name: Build Go CLI
        shell: cmd
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: Release test profile
        shell: cmd
        run: .\bin\aicoding.exe test --profile Release --reuse off --json

      - name: Audit Release Receipt reuse
        shell: cmd
        run: .\bin\aicoding.exe test --profile Release --verify-reuse --json

      - name: Upload Release gate evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-gate-evidence
          path: test-results/
          if-no-files-found: error

  clean-clone-full:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      - name: Report effective Go version
        shell: pwsh
        run: |
          $match = [regex]::Match((Get-Content go.mod -Raw), '(?m)^toolchain\s+(go\S+)\s*$')
          if (-not $match.Success) { throw 'go.mod has no toolchain directive' }
          $expected = $match.Groups[1].Value
          $actual = (go env GOVERSION).Trim()
          go version
          if ($actual -ne $expected) { throw "effective Go version $actual does not match go.mod toolchain $expected" }

      - name: Build Go CLI
        shell: cmd
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: Clean-clone Full Go tests
        shell: cmd
        run: .\bin\aicoding.exe fresh-clone --profile Full --json

  # workflow_dispatch is the explicit schedule-equivalent probe; pull_request and push never select this job.
  scheduled-doctor-perf:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      - name: Report effective Go version
        shell: pwsh
        run: |
          $match = [regex]::Match((Get-Content go.mod -Raw), '(?m)^toolchain\s+(go\S+)\s*$')
          if (-not $match.Success) { throw 'go.mod has no toolchain directive' }
          $expected = $match.Groups[1].Value
          $actual = (go env GOVERSION).Trim()
          go version
          if ($actual -ne $expected) { throw "effective Go version $actual does not match go.mod toolchain $expected" }

      - name: Build Go CLI
        shell: cmd
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: Scheduled doctor performance gate
        shell: pwsh
        run: |
          $output = & .\bin\aicoding.exe doctor perf --json
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath doctor-perf.json
          exit $exitCode

      - name: Upload doctor performance evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: doctor-perf-evidence
          path: doctor-perf.json
          if-no-files-found: error
