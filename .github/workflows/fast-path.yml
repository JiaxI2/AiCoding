name: AiCoding Go First

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
  schedule:
    - cron: '17 20 * * 0'

jobs:
  go-first:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Go tests
        shell: pwsh
        run: go test ./...

      - name: Build Go CLI
        shell: pwsh
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: DocSync CI
        shell: pwsh
        run: bin/aicoding.exe docsync ci --json

      - name: Skill smoke verification
        shell: pwsh
        run: bin/aicoding.exe skill verify --all --profile Smoke --json

      - name: Lifecycle install plan
        shell: pwsh
        run: bin/aicoding.exe lifecycle plan --action install --all --json

      - name: Full Go aggregate
        shell: pwsh
        run: bin/aicoding.exe full --json

      - name: Export bundle
        shell: pwsh
        run: |
          bin/aicoding.exe export --all --zip --json
          Remove-Item -Path dist/aicoding-kit-*.zip -Force -ErrorAction SilentlyContinue
          Remove-Item -Path dist/aicoding-kit-*.zip.manifest.json -Force -ErrorAction SilentlyContinue
          Remove-Item -Path dist/aicoding-kit-*.zip.sha256 -Force -ErrorAction SilentlyContinue

  release-manual:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Go CLI
        shell: pwsh
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: Release gate
        shell: pwsh
        run: bin/aicoding.exe release gate --json
