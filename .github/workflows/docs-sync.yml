name: Documentation Sync

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  docs-sync:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build AiCoding Go CLI
        shell: pwsh
        run: go build -o bin/aicoding.exe ./cmd/aicoding

      - name: Check documentation synchronization
        shell: pwsh
        run: bin/aicoding.exe docsync ci --json
